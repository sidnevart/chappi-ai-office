services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-office-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_office}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./vps/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ai-office-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./vps/monitoring/grafana-provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - default
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-office-prometheus
    restart: unless-stopped
    volumes:
      - ./vps/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-office-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    container_name: ai-office-loki
    restart: unless-stopped
    volumes:
      - ./vps/monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: ai-office-promtail
    restart: unless-stopped
    volumes:
      - ./vps/monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - monitoring

volumes:
  pgdata:
  grafana-data:
  prometheus-data:
  loki-data:

networks:
  monitoring:
    driver: bridge
