server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: journald
    journal:
      max_age: 12h
      labels:
        job: journald
    pipeline_stages:
      # Extract level from openclaw JSON log lines
      - match:
          selector: '{job="journald"}'
          stages:
            - json:
                expressions:
                  _level: '_meta.logLevelName'
                  _unit: ''
            - template:
                source: level
                template: '{{ if ._level }}{{ toLower ._level }}{{ else }}info{{ end }}'
            - labels:
                level:
      # Fallback: detect level from plain text
      - match:
          selector: '{job="journald", level=""}'
          stages:
            - regex:
                expression: '(?i)(level|lvl)=(?P<level>error|warn|info|debug)'
            - labels:
                level:
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_priority_keyword']
        target_label: priority
